<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BP Screener</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero">
      <nav class="nav">
        <strong>BP Screener</strong>
        <select id="language">
          <option value="en">English</option>
          <option value="zh">中文</option>
        </select>
      </nav>
      <div>
        <p class="eyebrow" data-i18n="eyebrow">Lightweight Deal Flow Screening</p>
        <h1 data-i18n="title">Search, filter, and understand pitch decks faster.</h1>
        <p class="subtitle" data-i18n="subtitle">
          A Cloudflare-ready frontend for structured BP profiles generated by the local Python ingestion pipeline.
        </p>
      </div>
    </header>

    <main class="shell">
      <section class="panel filters">
        <div>
          <label data-i18n="keyword">Keyword</label>
          <input id="keyword" type="search" placeholder="AI healthcare, SaaS, Series A" />
        </div>
        <div>
          <label data-i18n="industry">Industry</label>
          <input id="industry" type="search" placeholder="Healthcare" />
        </div>
        <div>
          <label data-i18n="stage">Stage</label>
          <input id="stage" type="search" placeholder="Seed / A" />
        </div>
        <div>
          <label data-i18n="recommendation">Recommendation</label>
          <select id="recommendation">
            <option value="" data-i18n="any">Any</option>
            <option value="高" data-i18n="high">High</option>
            <option value="中" data-i18n="medium">Medium</option>
            <option value="低" data-i18n="low">Low</option>
            <option value="未知" data-i18n="unknown">Unknown</option>
          </select>
        </div>
        <label class="check">
          <input id="aiOnly" type="checkbox" />
          <span data-i18n="aiOnly">AI-related only</span>
        </label>
        <button id="searchButton" data-i18n="search">Search</button>
      </section>

      <section class="stats">
        <div class="stat">
          <span id="projectCount">0</span>
          <small data-i18n="projects">Projects</small>
        </div>
        <div class="stat">
          <span id="aiCount">0</span>
          <small data-i18n="aiProjects">AI-related</small>
        </div>
      </section>

      <section id="projectGrid" class="grid"></section>

      <section class="panel">
        <div class="sectionTitle">
          <h2 data-i18n="sourceSearch">Source Snippet Search</h2>
          <button id="snippetButton" data-i18n="searchSnippets">Search snippets</button>
        </div>
        <div id="snippetList" class="snippets"></div>
      </section>
    </main>

    <dialog id="projectDialog">
      <button id="closeDialog" class="close">×</button>
      <div id="projectDetail"></div>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
